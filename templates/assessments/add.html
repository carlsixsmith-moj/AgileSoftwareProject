{% extends "base.html" %}


{% block content %}

<nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
            <a href="{{ url_for('participants.list_participants') }}">
                Participants
            </a>

        </li>
        <li class="breadcrumb-item">
            <a href="{{ url_for('participants.edit_participant', id = participantId) }}">
                {{ participantId }}
            </a>
        </li>
        <li class="breadcrumb-item ">
            <a href="{{ url_for('assessments.list_assessments', participantId = participantId) }}">
                Assessments
            </a>
        </li>
        <li class="breadcrumb-item active">
            Add
        </li>
    </ol>
</nav>

<form method="post">
    <div class="mb-2">
        <label for="date_recorded" class="form-label">Date Recorded</label>
        <input type="date" id="date_recorded" name="date_recorded" class="form-control"
            value="{{frm_date_recorded or ''}}" required />
    </div>

    <h5>Thoughts and Behaviours</h5>

    <!-- Bounce Back --->
    <div class="mb-2">
        <label for="bounce_back" class="form-label">
            I tend to bounce back quickly after hard times
        </label>
        <select class="form-select" id="bounce_back" name="bounce_back" required>
            <option selected></option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Disagree">Disagree</option>
            <option value="Neither">Neither</option>
            <option value="Agree">Agree</option>
            <option value="Strongly Agree">Strongly Agree</option>
        </select>
    </div>

    <!-- Consequences -->
    <div class="mb-2">
        <label for="consequences" class="form-label">
            I often do things without thinking of the consequences
        </label>
        <select class="form-select" id="consequences" name="consequences" required>
            <option selected></option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Disagree">Disagree</option>
            <option value="Neither">Neither</option>
            <option value="Agree">Agree</option>
            <option value="Strongly Agree">Strongly Agree</option>
        </select>
    </div>

    <!-- Working Hard -->
    <div class="mb-2">
        <label for="working_hard" class="form-label">
            I am really working hard to change my life
        </label>
        <select class="form-select" id="working_hard" name="working_hard" required>
            <option selected></option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Disagree">Disagree</option>
            <option value="Neither">Neither</option>
            <option value="Agree">Agree</option>
            <option value="Strongly Agree">Strongly Agree</option>
        </select>
    </div>

    <!-- Feel good -->
    <div class="mb-2">
        <label for="feel_good" class="form-label">
            I feel good about myself
        </label>
        <select class="form-select" id="feel_good" name="feel_good" required>
            <option selected></option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Disagree">Disagree</option>
            <option value="Neither">Neither</option>
            <option value="Agree">Agree</option>
            <option value="Strongly Agree">Strongly Agree</option>
        </select>
    </div>

    <!-- Adaptable -->
    <div class="mb-2">
        <label for="adaptable" class="form-label">
            I find it easy to adapt to changes in my life
        </label>
        <select class="form-select" id="adaptable" name="adaptable" required>
            <option selected></option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Disagree">Disagree</option>
            <option value="Neither">Neither</option>
            <option value="Agree">Agree</option>
            <option value="Strongly Agree">Strongly Agree</option>
        </select>
    </div>

    <!-- feelings -->
    <div class="mb-2">
        <label for="feelings" class="form-label">
            I struggle to understand my own or other people's feelings
        </label>
        <select class="form-select" id="feelings" name="feelings" required>
            <option selected></option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Disagree">Disagree</option>
            <option value="Neither">Neither</option>
            <option value="Agree">Agree</option>
            <option value="Strongly Agree">Strongly Agree</option>
        </select>
    </div>

    <!-- emotional problems -->
    <div class="mb-2">
        <label for="emotional_problems" class="form-label">
            My emotions can get the better of me
        </label>
        <select class="form-select" id="emotional_problems" name="emotional_problems" required>
            <option selected></option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Disagree">Disagree</option>
            <option value="Neither">Neither</option>
            <option value="Agree">Agree</option>
            <option value="Strongly Agree">Strongly Agree</option>
        </select>
    </div>

    <!-- easy to talk -->
    <div class="mb-2">
        <label for="easy_to_talk" class="form-label">
            I find it easy to talk to other people
        </label>
        <select class="form-select" id="easy_to_talk" name="easy_to_talk" required>
            <option selected></option>
            <option value="Strongly Disagree">Strongly Disagree</option>
            <option value="Disagree">Disagree</option>
            <option value="Neither">Neither</option>
            <option value="Agree">Agree</option>
            <option value="Strongly Agree">Strongly Agree</option>
        </select>
    </div>


    <button type="submit" class="btn btn-primary">Save</button>
</form>

{% endblock %}
