{% extends "base.html" %}

{% block content %}

 <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
        <li class="breadcrumb-item">
             <a href="{{ url_for('participants.list_participants') }}" >
                    Participants
            </a> 
            
        </li>
        <li class="breadcrumb-item active" aria-current="page">{{ participant.id }}</li>
    </ol>
</nav>


    {% if error %}
    <div class="alert alert-danger" role="alert">
        {{ error }}
    </div>
    {% endif %}

    <form method="post" class="pa-4">
        <div class="mb-3">
            <label for="id" class="form-label">Id</label>
            <input type="text" id="id" name="id" class="form-control" value="{{ participant.id }}" required maxlength="9" minlength="9" readonly />
        </div>
        <div class="mb-3">
            <label for="name" class="form-label">Participant Name</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ participant.name }}" required maxlength="50" />
        </div>
        <div class="mb-3">
            <label for="dob" class="form-label">Date of Birth</label>
            <input type="date" id="dob" name="dob" class="form-control" value="{{ form_dob or participant.dob.strftime('%Y-%m-%d') }}" required />
        </div>
        <a href="{{ url_for('assessments.list_assessments', participantId = participant.id) }}" class="btn btn-secondary" >
                    Assessments
        </a> 
        <button type="submit" class="btn btn-primary">Save</button>
    </form>

{% endblock %}
